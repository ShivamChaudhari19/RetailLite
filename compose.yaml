services:
  mysql:
    image: mysql:8.0.32
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: shivam
      MYSQL_DATABASE: retail_lite
#      MYSQL_USER: root
#      MYSQL_PASSWORD: shivam
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL","mysql -u root -pshivam -e 'SELECT 1'"]
      timeout: 20s
      retries: 10
      interval: 5s
    volumes:
      - mysql-data:/var/lib/mysql
  app:
    build: .
    image: retail-lite:v1
    container_name: retail-lite-app
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      mysql:
         condition: service_healthy
volumes:
  mysql-data: